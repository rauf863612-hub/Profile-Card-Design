<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- box icons -->
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="profile-card">
      <div class="image">
        <img src="profile.jpeg" class="profile-image" />
      </div>

      <div class="test-data">
        <span class="name">Coding Lab</span>
        <span class="job">Youtuber & bloger</span>
      </div>

      <div class="media-buttons">
        <a href="#" style="background-color: rgb(11, 69, 121)" class="link">
          <i class="bx bxl-facebook"></i>
        </a>
        <a href="#" style="background-color: rgb(104, 122, 184)" class="link">
          <i class="bx bxl-twitter"></i>
        </a>
        <a href="#" style="background-color: rgb(226, 98, 60)" class="link">
          <i class="bx bxl-instagram"></i>
        </a>

        <a href="#" style="background-color: rgb(228, 8, 8)" class="link">
          <i class="bx bxl-youtube"></i>
        </a>
      </div>

      <div class="buttons">
        <button class="button">Subcribe</button>
        <button class="button">Message</button>
      </div>
      <div class="analytics">
        <div class="data">
          <i class="bx bx-heart"></i>
          <span class="numbers">60k</span>
        </div>
        <div class="data">
          <i class="bx bx-message"></i>
          <span class="numbers">30k</span>
        </div>
        <div class="data">
          <i class="bx bx-share"></i>
          <span class="numbers">12k</span>
        </div>
      </div>
    </div>
  </body>
</html>
